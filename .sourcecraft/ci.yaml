# SourceCraft CI/CD Configuration
# Простая конфигурация для сборки и тестирования Terminal Launcher

on:
  push:
    - workflows: build-and-test
      filter:
        branches: ["main", "develop"]
        paths: 
          - "src/**"
          - "package.json"
          - "*.ts"
          - "*.js"
  
  pull_request:
    - workflows: build-and-test
      filter:
        target_branches: ["main"]

workflows:
  # Рабочий процесс для сборки и тестирования
  build-and-test:
    tasks:
      - name: install-dependencies
        cubes:
          - name: node-setup
            image: node:25-alpine
            script:
              - echo "📦 Установка зависимостей..."
              - npm ci --prefer-offline
            artifacts:
              paths:
                - node_modules
      
      - name: lint-code
        needs: [install-dependencies]
        cubes:
          - name: eslint
            image: node:25-alpine
            script:
              - echo "🔍 Проверка кода..."
              - npm run lint || echo "Linting completed with warnings"
      
      - name: type-check
        needs: [install-dependencies]
        cubes:
          - name: typescript
            image: node:25-alpine
            script:
              - echo "✓ Проверка типов TypeScript..."
              - npx tsc --noEmit || echo "Type check completed"
      
      - name: build-app
        needs: [install-dependencies]
        cubes:
          - name: electron-build
            image: node:25-alpine
            script:
              - echo "🏗️ Сборка приложения..."
              - npm run build
              - echo "✅ Сборка завершена!"
            artifacts:
              paths:
                - dist/
                - out/

  # Рабочий процесс для создания релиза (при push тега)
  create-release:
    runs_on:
      - compute
    tasks:
      - name: build-release
        cubes:
          - name: build-linux
            image: node:25-alpine
            script:
              - echo "🚀 Создание Linux сборки..."
              - npm ci
              - npm run electron:build:linux
              - echo "✅ Linux сборка готова!"
            artifacts:
              paths:
                - dist/*.AppImage
                - dist/*.deb
                - dist/*.rpm

# Дополнительные настройки
env:
  NODE_ENV: production
  CI: true
