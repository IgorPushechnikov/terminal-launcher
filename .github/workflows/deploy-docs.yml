name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'README_RU.md'
  workflow_dispatch:  # Ручной запуск

jobs:
  deploy-github-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
      
      - name: Build documentation (if using docs generator)
        run: |
          # Если используете генератор документации (VitePress, Docusaurus и т.д.)
          # npm install
          # npm run docs:build
          echo "Documentation build step (customize as needed)"
      
      - name: Prepare docs for deployment
        run: |
          # Создаём папку для деплоя
          mkdir -p deploy-site
          
          # Копируем README и документацию
          cp README.md deploy-site/index.html
          cp -r docs/* deploy-site/ 2>/dev/null || true
          
          # Создаём простой index.html если нет генератора
          cat > deploy-site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Terminal Launcher - Documentation</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
                  h1 { color: #2c3e50; }
                  a { color: #3498db; text-decoration: none; }
                  a:hover { text-decoration: underline; }
                  .nav { background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
              </style>
          </head>
          <body>
              <h1>📖 Terminal Launcher Documentation</h1>
              <div class="nav">
                  <strong>Quick Links:</strong><br>
                  <a href="https://github.com/IgorPushechnikov/terminal-launcher">GitHub Repository</a> •
                  <a href="https://github.com/IgorPushechnikov/terminal-launcher/releases">Releases</a> •
                  <a href="https://github.com/IgorPushechnikov/terminal-launcher/issues">Issues</a>
              </div>
              <p>Full documentation is available in the repository:</p>
              <ul>
                  <li><a href="https://github.com/IgorPushechnikov/terminal-launcher/blob/main/README.md">English README</a></li>
                  <li><a href="https://github.com/IgorPushechnikov/terminal-launcher/blob/main/README_RU.md">Russian README</a></li>
                  <li><a href="https://github.com/IgorPushechnikov/terminal-launcher/tree/main/docs/en">English Docs</a></li>
                  <li><a href="https://github.com/IgorPushechnikov/terminal-launcher/tree/main/docs/ru">Russian Docs</a></li>
              </ul>
          </body>
          </html>
          EOF
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-site
          keep_files: false
      
      - name: Summary
        run: |
          echo "## 🌐 Documentation Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub Pages: https://igorpushechnikov.github.io/terminal-launcher/" >> $GITHUB_STEP_SUMMARY
          echo "- ℹ️ SourceCraft Pages: Configure separately" >> $GITHUB_STEP_SUMMARY
          echo "- ℹ️ GitVerse Pages: Configure separately" >> $GITHUB_STEP_SUMMARY

  deploy-sourcecraft-pages:
    name: Deploy to SourceCraft Pages
    runs-on: ubuntu-latest
    needs: deploy-github-pages
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Prepare Russian docs
        run: |
          mkdir -p deploy-site-ru
          cp README_RU.md deploy-site-ru/index.md
          cp -r docs/ru/* deploy-site-ru/ 2>/dev/null || true
          
          # Создаём простой index.html
          cat > deploy-site-ru/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ru">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Terminal Launcher - Документация</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
                  h1 { color: #2c3e50; }
                  a { color: #3498db; text-decoration: none; }
                  a:hover { text-decoration: underline; }
                  .nav { background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
              </style>
          </head>
          <body>
              <h1>📖 Terminal Launcher - Документация</h1>
              <div class="nav">
                  <strong>Быстрые ссылки:</strong><br>
                  <a href="https://sourcecraft.dev/ipushechnikov/terminal-launcher">Репозиторий SourceCraft</a> •
                  <a href="https://github.com/IgorPushechnikov/terminal-launcher">GitHub</a>
              </div>
              <p>Полная документация доступна в репозитории:</p>
              <ul>
                  <li><a href="https://github.com/IgorPushechnikov/terminal-launcher/blob/main/README_RU.md">Русский README</a></li>
                  <li><a href="https://github.com/IgorPushechnikov/terminal-launcher/tree/main/docs/ru">Документация (RU)</a></li>
              </ul>
          </body>
          </html>
          EOF
      
      - name: Deploy to SourceCraft
        continue-on-error: true
        env:
          SOURCECRAFT_TOKEN: ${{ secrets.SOURCECRAFT_TOKEN }}
        run: |
          echo "Deploying to SourceCraft Pages..."
          # Настройка git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Clone gh-pages branch
          git clone --branch gh-pages --single-branch https://ipushechnikov:${SOURCECRAFT_TOKEN}@sourcecraft.dev/ipushechnikov/terminal-launcher.git sc-pages 2>/dev/null || {
            echo "Creating new gh-pages branch for SourceCraft"
            mkdir -p sc-pages
            cd sc-pages
            git init
            git checkout -b gh-pages
          }
          
          cd sc-pages
          
          # Copy prepared files
          rm -rf *
          cp -r ../deploy-site-ru/* .
          
          # Commit and push
          git add .
          git commit -m "Update documentation (auto-deploy from GitHub)"
          git push origin gh-pages
          
          echo "✓ Successfully deployed to SourceCraft Pages"
      
      - name: Summary
        if: always()
        run: |
          echo "- 🔄 SourceCraft Pages: ${{ job.status == 'success' && '✅ Deployed' || '⚠️ Failed' }}" >> $GITHUB_STEP_SUMMARY

  deploy-gitverse-pages:
    name: Deploy to GitVerse Pages
    runs-on: ubuntu-latest
    needs: deploy-github-pages
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Prepare Russian docs
        run: |
          mkdir -p deploy-site-ru
          cp README_RU.md deploy-site-ru/index.md
          cp -r docs/ru/* deploy-site-ru/ 2>/dev/null || true
          
          # Создаём простой index.html
          cat > deploy-site-ru/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ru">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Terminal Launcher - Документация</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; }
                  h1 { color: #2c3e50; }
                  a { color: #3498db; text-decoration: none; }
                  a:hover { text-decoration: underline; }
                  .nav { background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
              </style>
          </head>
          <body>
              <h1>📖 Terminal Launcher - Документация</h1>
              <div class="nav">
                  <strong>Быстрые ссылки:</strong><br>
                  <a href="https://gitverse.ru/ipushechnikov/terminal-launcher">Репозиторий GitVerse</a> •
                  <a href="https://github.com/IgorPushechnikov/terminal-launcher">GitHub</a>
              </div>
              <p>Полная документация доступна в репозитории:</p>
              <ul>
                  <li><a href="https://github.com/IgorPushechnikov/terminal-launcher/blob/main/README_RU.md">Русский README</a></li>
                  <li><a href="https://github.com/IgorPushechnikov/terminal-launcher/tree/main/docs/ru">Документация (RU)</a></li>
              </ul>
          </body>
          </html>
          EOF
      
      - name: Deploy to GitVerse
        continue-on-error: true
        env:
          GITVERSE_TOKEN: ${{ secrets.GITVERSE_TOKEN }}
        run: |
          echo "Deploying to GitVerse Pages..."
          # Настройка git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Clone gh-pages branch
          git clone --branch gh-pages --single-branch https://ipushechnikov:${GITVERSE_TOKEN}@gitverse.ru/ipushechnikov/terminal-launcher.git gv-pages 2>/dev/null || {
            echo "Creating new gh-pages branch for GitVerse"
            mkdir -p gv-pages
            cd gv-pages
            git init
            git checkout -b gh-pages
          }
          
          cd gv-pages
          
          # Copy prepared files
          rm -rf *
          cp -r ../deploy-site-ru/* .
          
          # Commit and push
          git add .
          git commit -m "Update documentation (auto-deploy from GitHub)"
          git push origin gh-pages
          
          echo "✓ Successfully deployed to GitVerse Pages"
      
      - name: Summary
        if: always()
        run: |
          echo "- 🔄 GitVerse Pages: ${{ job.status == 'success' && '✅ Deployed' || '⚠️ Failed' }}" >> $GITHUB_STEP_SUMMARY
